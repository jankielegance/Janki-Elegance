# Decap CMS configuration — the owner-only Catalog Manager.
#
# GitHub backend: the owner logs in with a GitHub account (must be a
# collaborator on this repo). Login is completed by your OWN Cloudflare
# Worker OAuth relay — so this does NOT depend on Netlify Identity/Git
# Gateway (which Netlify has deprecated). See README for the 15-min setup.
backend:
  name: github
  repo: jankielegance/Janki-Elegance
  branch: main
  # Cloudflare Worker OAuth relay (no trailing slash).
  base_url: https://sveltia-cms-auth.jankielegance.workers.dev

# Where uploaded product photos are stored in the repo, and how the
# site refers to them. media_folder = on disk; public_folder = in the URL.
media_folder: "images/uploads"
public_folder: "/images/uploads"

# Friendly UI labels
site_url: /
display_url: /
logo_url: /images/placeholder-1.svg

collections:
  - name: "catalog"
    label: "Catalog"
    files:
      - name: "products"
        label: "Products"
        file: "content/products.json"
        description: "Add, edit, or remove the items shown on your store."
        editor:
          preview: false
        fields:
          - name: "products"
            label: "Products"
            label_singular: "Product"
            widget: "list"
            summary: "{{fields.name}} — ₹{{fields.price}}"
            fields:
              - { name: "name", label: "Product name", widget: "string" }
              - name: "category"
                label: "Category"
                widget: "select"
                options:
                  - "Sarees"
                  - "Cotton Kurtis"
                  - "Co-ord Sets"
                  - "3 Piece Suits"
                  - "Frock Kurtis"
                  - "Palazzo Pants"
                  - "Mekhela Sador"
                  - "Kids Wear"
                  - "Artificial Jewellery"
                  - "Lehengas"
                  - "Indo-Western"
                  - "Suit Fabric"
              - { name: "price", label: "Price (₹)", widget: "number", value_type: "int", min: 0 }
              - { name: "compare_at_price", label: "Original price (₹) — optional, shows a strike-through 'Sale'", widget: "number", value_type: "int", min: 0, required: false }
              - { name: "image", label: "Main photo (shown on cards)", widget: "image", required: false, hint: "Upload a portrait (tall) photo for best results." }
              - name: "images"
                label: "Gallery photos (product page)"
                widget: "list"
                required: false
                field: { name: "photo", label: "Photo", widget: "image" }
                hint: "Add multiple photos shown on the product detail page. The first one is used as the main image if the field above is empty."
              - name: "sizes"
                label: "Available sizes"
                widget: "select"
                multiple: true
                required: false
                default: ["XS", "S", "M", "L", "XL", "2XL", "3XL", "4XL"]
                options: ["XS", "S", "M", "L", "XL", "2XL", "3XL", "4XL", "Free Size", "Unstitched", "2-3Y", "4-5Y", "6-7Y", "8-9Y"]
              - { name: "rating", label: "Rating (0–5) — optional", widget: "number", value_type: "float", min: 0, max: 5, step: 0.1, required: false }
              - { name: "reviews", label: "Number of reviews — optional", widget: "number", value_type: "int", min: 0, required: false }
              - { name: "description", label: "Description", widget: "text", required: false }
              - { name: "sold_out", label: "Sold out?", widget: "boolean", default: false, required: false }
              - { name: "featured", label: "Featured?", widget: "boolean", default: false, required: false }
