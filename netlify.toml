# Netlify configuration for Janki Elegance.
# This is a plain static site — there is no build step.
[build]
  publish = "."
  command = ""

# Send any unknown URL to the homepage (nice for shared links).
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Security headers (sensible defaults for a static storefront).
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
